# ============================================================
# loki-config.yml
# Configures Loki — the log aggregation and storage system.
# Loki is like Prometheus but for logs instead of metrics.
# ============================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /opt/monitoring/loki/data
  storage:
    filesystem:
      chunks_directory: /opt/monitoring/loki/data/chunks
      rules_directory: /opt/monitoring/loki/data/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

limits_config:
  retention_period: 744h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_query_series: 100000
  allow_structured_metadata: false

compactor:
  working_directory: /opt/monitoring/loki/data/compactor
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
