# ============================================================
# tempo-config.yml
# Configures Tempo — the distributed tracing backend.
# Tempo stores and queries traces from instrumented services.
# Think of it as Loki but for traces instead of logs.
# ============================================================

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 720h

metrics_generator:
  registry:
    external_labels:
      source: tempo
      environment: production
  storage:
    path: /opt/monitoring/tempo/data/generator/wal
    remote_write:
      - url: http://localhost:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: local
    wal:
      path: /opt/monitoring/tempo/data/wal
    local:
      path: /opt/monitoring/tempo/data/blocks

querier:
  max_concurrent_queries: 20

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
    ingestion:
      rate_limit_bytes: 15000000
      burst_size_bytes: 20000000

analytics:
  reporting_enabled: false
